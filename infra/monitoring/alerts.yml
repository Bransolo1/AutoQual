groups:
  - name: autoqual-api
    rules:
      - alert: ApiHighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API error rate elevated"

  - name: autoqual-worker
    rules:
      - alert: WorkerQueueLagHigh
        expr: sum(queue_lag_seconds) > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker queue lag elevated"

  - name: sensehub-alerts
    rules:
      - alert: SensehubApiDown
        expr: up{job="sensehub-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Sensehub API is down"
          description: "No successful scrapes for sensehub-api."
      - alert: SensehubWebDown
        expr: up{job="sensehub-web"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Sensehub web is down"
          description: "No successful scrapes for sensehub-web."
