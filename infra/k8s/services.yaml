apiVersion: v1
kind: Service
metadata:
  name: sensehub-api
spec:
  selector:
    app: sensehub-api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: sensehub-web
spec:
  selector:
    app: sensehub-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
