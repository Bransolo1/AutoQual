apiVersion: batch/v1
kind: Job
metadata:
  name: sensehub-migrate
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: sensehub/api:latest
          command: ["npm", "--workspace", "apps/api", "run", "prisma:migrate"]
          envFrom:
            - configMapRef:
                name: sensehub-config
            - secretRef:
                name: sensehub-secrets
