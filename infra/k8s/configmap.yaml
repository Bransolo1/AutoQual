apiVersion: v1
kind: ConfigMap
metadata:
  name: sensehub-config
data:
  WEB_BASE_URL: "http://sensehub-web"
  CORS_ORIGIN: "http://sensehub-web"
  OPENSEARCH_URL: "http://opensearch:9200"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  S3_ENDPOINT: "http://minio:9000"
  S3_REGION: "us-east-1"
  S3_BUCKET: "sensehub"
  AI_PROVIDER: "mock"
  THROTTLE_TTL: "60"
  THROTTLE_LIMIT: "120"
  OTEL_SERVICE_NAME: "sensehub-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
