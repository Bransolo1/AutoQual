apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensehub-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensehub-web
  template:
    metadata:
      labels:
        app: sensehub-web
    spec:
      containers:
        - name: web
          image: sensehub/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://sensehub-api:4000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
