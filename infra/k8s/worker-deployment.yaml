apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensehub-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensehub-worker
  template:
    metadata:
      labels:
        app: sensehub-worker
    spec:
      containers:
        - name: worker
          image: sensehub/worker:latest
