apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensehub-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensehub-worker
  template:
    metadata:
      labels:
        app: sensehub-worker
    spec:
      containers:
        - name: worker
          image: sensehub/worker:latest
          envFrom:
            - configMapRef:
                name: sensehub-config
            - secretRef:
                name: sensehub-secrets
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
