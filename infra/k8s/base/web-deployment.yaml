apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensehub-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensehub-web
  template:
    metadata:
      labels:
        app: sensehub-web
    spec:
      containers:
        - name: web
          image: ghcr.io/bransolo1/autoqual-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sensehub-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
