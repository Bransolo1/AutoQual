apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sensehub-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - yourdomain.com
      secretName: sensehub-tls
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sensehub-api
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sensehub-web
                port:
                  number: 3000
