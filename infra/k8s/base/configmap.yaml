apiVersion: v1
kind: ConfigMap
metadata:
  name: sensehub-config
data:
  WEB_BASE_URL: "https://yourdomain.com"
  NEXT_PUBLIC_API_URL: "https://yourdomain.com/api"
  CORS_ORIGIN: "https://yourdomain.com"
  OPENSEARCH_URL: "https://opensearch.example.com"
  REDIS_HOST: "redis.example.com"
  REDIS_PORT: "6379"
  S3_ENDPOINT: "https://s3.amazonaws.com"
  S3_REGION: "us-east-1"
  S3_BUCKET: "autoqual-raw-media"
  AI_PROVIDER: "mock"
  THROTTLE_TTL: "60"
  THROTTLE_LIMIT: "120"
  OTEL_SERVICE_NAME: "sensehub-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
  SSO_ENABLED: "true"
  SSO_ISSUER_URL: "https://issuer.example.com"
  SSO_CLIENT_ID: "replace_me"
  SSO_REDIRECT_URI: "https://yourdomain.com/auth/sso/callback"
  SSO_ALLOWED_DOMAINS: ""
  SSO_GROUP_ROLE_MAP: "{}"
  SSO_DEFAULT_ROLE: "researcher"
  SECRETS_PROVIDER: "env"
  VAULT_ADDR: ""
  VAULT_ROLE: ""
