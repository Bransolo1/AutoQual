# ─────────────────────────────────────────────────────────────────────────────
# This file is a TEMPLATE only. Never commit real secrets.
# In production use External Secrets Operator (see infra/k8s/base/external-secrets/)
# or inject via your secret management solution (Vault, AWS Secrets Manager, etc.)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: sensehub-secrets
type: Opaque
stringData:
  DATABASE_URL: "CHANGE_ME"            # postgresql://user:pass@host:5432/db
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"             # or use JWT_JWKS_URL for OIDC JWKS
  EMBED_SECRET: "CHANGE_ME"           # min 16 chars
  OPENSEARCH_USERNAME: "CHANGE_ME"
  OPENSEARCH_PASSWORD: "CHANGE_ME"
  SSO_CLIENT_SECRET: "CHANGE_ME"
  VAULT_TOKEN: ""                      # leave empty if SECRETS_PROVIDER=env
  SESSION_SECRET: "CHANGE_ME"         # min 32 chars; for web session cookie signing
