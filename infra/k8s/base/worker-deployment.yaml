apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensehub-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensehub-worker
  template:
    metadata:
      labels:
        app: sensehub-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/bransolo1/autoqual-worker:latest
          envFrom:
            - configMapRef:
                name: sensehub-config
            - secretRef:
                name: sensehub-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_URL
              value: "http://sensehub-api:4000"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
