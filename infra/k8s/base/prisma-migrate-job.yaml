apiVersion: batch/v1
kind: Job
metadata:
  name: sensehub-prisma-migrate
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: prisma-migrate
          image: ghcr.io/bransolo1/autoqual-api:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: sensehub-config
            - secretRef:
                name: sensehub-secrets
