apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensehub-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sensehub-api
  template:
    metadata:
      labels:
        app: sensehub-api
    spec:
      containers:
        - name: api
          image: sensehub/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: sensehub-config
            - secretRef:
                name: sensehub-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
