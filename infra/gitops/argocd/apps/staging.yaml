apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: autoqual-staging
spec:
  project: default
  source:
    repoURL: CHANGE_ME_REPO_URL
    targetRevision: CHANGE_ME_REVISION
    path: infra/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: sensehub-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
